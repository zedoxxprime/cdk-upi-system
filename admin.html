<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — CDK Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            color: #e8e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 30px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #6c5ce7, #00b894);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: #111118;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #8888aa;
            font-size: 12px;
            font-weight: 600;
            margin: 12px 0 6px;
        }
        input,
        select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
        }
        input:focus,
        select:focus {
            outline: none;
            border-color: #6c5ce7;
        }
        select option {
            background: #111118;
            color: #e8e8f0;
        }
        .btn {
            padding: 10px 24px;
            border: 0;
            border-radius: 8px;
            background: linear-gradient(135deg, #6c5ce7, #00b894);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-danger {
            background: linear-gradient(135deg, #fd79a8, #e17055);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2a2a3a;
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .stats {
                grid-template-columns: 1fr 1fr;
            }
        }
        .stat {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }
        .stat .num {
            font-size: 28px;
            font-weight: 800;
        }
        .stat .label {
            font-size: 11px;
            color: #8888aa;
            margin-top: 4px;
        }
        .cdk-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            margin: 6px 0;
            background: rgba(0, 0, 0, 0.2);
            flex-wrap: wrap;
            gap: 8px;
        }
        .cdk-item .info {
            flex: 1;
            min-width: 150px;
        }
        .cdk-item .key {
            font-family: monospace;
            font-weight: 600;
            font-size: 14px;
        }
        .cdk-item .meta {
            font-size: 11px;
            color: #8888aa;
            margin-top: 2px;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
        }
        .badge-available {
            background: rgba(0, 184, 148, 0.2);
            color: #55efc4;
        }
        .badge-used {
            background: rgba(253, 121, 168, 0.2);
            color: #fd79a8;
        }
        .badge-partial {
            background: rgba(255, 209, 102, 0.2);
            color: #ffd166;
        }
        .auth-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(108, 92, 231, 0.05);
            border: 1px solid rgba(108, 92, 231, 0.15);
            border-radius: 12px;
        }
        .auth-section .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .auth-section .user-info .email {
            color: var(--muted);
            font-size: 14px;
        }
        .auth-section .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #00b894);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .login-box {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .login-box input {
            width: auto;
            min-width: 200px;
        }
        .login-box .btn {
            margin-top: 0;
        }
        .hidden {
            display: none !important;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-bar button {
            padding: 6px 14px;
            border: 1px solid #2a2a3a;
            background: transparent;
            color: #8888aa;
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .filter-bar button.active {
            background: rgba(108, 92, 231, 0.15);
            border-color: #6c5ce7;
            color: #fff;
        }
        .filter-bar button:hover {
            border-color: #6c5ce7;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 22px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            z-index: 999;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .toast.success {
            background: rgba(0, 184, 148, 0.92);
            color: #fff;
        }
        .toast.error {
            background: rgba(253, 121, 168, 0.92);
            color: #fff;
        }
        .toast.info {
            background: rgba(108, 92, 231, 0.92);
            color: #fff;
        }
        .back-link {
            color: #55efc4;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .gap-8 {
            gap: 8px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .text-muted {
            color: #8888aa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flex-between">
            <h1>🔐 CDK Manager</h1>
            <a href="/" class="back-link">← Back to Tool</a>
        </div>

        <!-- AUTH SECTION -->
        <div class="auth-section" id="authSection">
            <div class="user-info" id="userInfo" style="display:none;">
                <div class="avatar">👤</div>
                <div>
                    <div style="font-weight:600;" id="adminName">Admin</div>
                    <div class="email" id="adminEmail">admin@example.com</div>
                </div>
            </div>
            <div class="login-box" id="loginBox">
                <input type="password" id="adminPassword" placeholder="Enter admin password..." style="min-width:200px;width:auto;" />
                <button class="btn" onclick="loginAdmin()">🔑 Login</button>
            </div>
            <button class="btn btn-danger hidden" id="logoutBtn" onclick="logoutAdmin()">🚪 Logout</button>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="stat"><div class="num" id="totalCdk">0</div><div class="label">Total CDKs</div></div>
            <div class="stat"><div class="num" id="availableCdk">0</div><div class="label">Available</div></div>
            <div class="stat"><div class="num" id="usedCdk">0</div><div class="label">Fully Used</div></div>
            <div class="stat"><div class="num" id="partialCdk">0</div><div class="label">Partial Used</div></div>
        </div>

        <!-- ADD CDK -->
        <div class="card">
            <h2 style="font-size:18px;margin-bottom:12px;">➕ Create New CDK</h2>
            <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;">
                <div>
                    <label>CDK Key</label>
                    <input id="newCdk" placeholder="CDK-XXXX-XXXX-XXXX" style="text-transform:uppercase;letter-spacing:1px;" />
                </div>
                <div>
                    <label>Usage Limit</label>
                    <select id="usageLimit">
                        <option value="1">1 (Single Use)</option>
                        <option value="2">2 Uses</option>
                        <option value="3">3 Uses</option>
                        <option value="5">5 Uses</option>
                        <option value="10">10 Uses</option>
                        <option value="999">Unlimited (999)</option>
                    </select>
                </div>
                <div>
                    <label>&nbsp;</label>
                    <button class="btn" onclick="addCDK()" style="width:100%;">➕ Add</button>
                </div>
            </div>
            <div id="addStatus" class="text-muted mt-8"></div>
        </div>

        <!-- CDK LIST -->
        <div class="card">
            <div class="flex-between">
                <h2 style="font-size:18px;">📋 All CDK Keys</h2>
                <button class="btn btn-outline" onclick="refreshList()">🔄 Refresh</button>
            </div>
            <div class="filter-bar">
                <button class="active" onclick="filterCDK('all')">All</button>
                <button onclick="filterCDK('available')">Available</button>
                <button onclick="filterCDK('partial')">Partial</button>
                <button onclick="filterCDK('used')">Used</button>
            </div>
            <div id="cdkList"></div>
        </div>

        <div style="text-align:center;padding:20px 0;border-top:1px solid #2a2a3a;margin-top:20px;font-size:12px;color:#8888aa;">
            <a href="https://t.me/zedox5" target="_blank" style="color:#55efc4;text-decoration:none;">📱 Buy CDK @zedox5</a>
            &nbsp;·&nbsp;
            <a href="https://t.me/zedoxprime1" target="_blank" style="color:#55efc4;text-decoration:none;">📢 Channel @zedoxprime1</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",
            authDomain: "globexo-d9ade.firebaseapp.com",
            projectId: "globexo-d9ade",
            storageBucket: "globexo-d9ade.firebasestorage.app",
            appId: "1:1009453417317:web:32538a719df79d3c6ed78c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let isAdmin = false;
        let currentFilter = 'all';
        let allCDKs = [];

        // ===== AUTH =====
        const ADMIN_PASSWORD = 'admin123'; // Change this to your secure password

        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('adminEmail').textContent = 'admin@zedox.com';
                toast('✅ Admin logged in', 'success');
                loadCDKs();
            } else {
                toast('❌ Wrong password', 'error');
            }
        }

        function logoutAdmin() {
            isAdmin = false;
            document.getElementById('loginBox').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
            document.getElementById('cdkList').innerHTML = '<div style="color:#8888aa;padding:20px;text-align:center;">🔐 Please login to view CDKs</div>';
            toast('Logged out', 'info');
        }

        // ===== LOAD CDKs =====
        async function loadCDKs() {
            if (!isAdmin) {
                document.getElementById('cdkList').innerHTML = '<div style="color:#8888aa;padding:20px;text-align:center;">🔐 Please login to view CDKs</div>';
                return;
            }

            try {
                const snapshot = await db.collection('cdk').orderBy('createdAt', 'desc').get();
                allCDKs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCDKs();
                updateStats();
            } catch (e) {
                toast('Error loading CDKs: ' + e.message, 'error');
            }
        }

        function updateStats() {
            const total = allCDKs.length;
            const available = allCDKs.filter(c => !c.used && (c.uses || 0) < (c.maxUses || 1)).length;
            const used = allCDKs.filter(c => c.used === true).length;
            const partial = allCDKs.filter(c => !c.used && (c.uses || 0) > 0 && (c.uses || 0) < (c.maxUses || 1)).length;

            document.getElementById('totalCdk').textContent = total;
            document.getElementById('availableCdk').textContent = available;
            document.getElementById('usedCdk').textContent = used;
            document.getElementById('partialCdk').textContent = partial;
        }

        function renderCDKs() {
            let filtered = allCDKs;
            if (currentFilter === 'available') {
                filtered = allCDKs.filter(c => !c.used && (c.uses || 0) < (c.maxUses || 1));
            } else if (currentFilter === 'partial') {
                filtered = allCDKs.filter(c => !c.used && (c.uses || 0) > 0 && (c.uses || 0) < (c.maxUses || 1));
            } else if (currentFilter === 'used') {
                filtered = allCDKs.filter(c => c.used === true);
            }

            const list = document.getElementById('cdkList');
            if (!isAdmin) {
                list.innerHTML = '<div style="color:#8888aa;padding:20px;text-align:center;">🔐 Please login to view CDKs</div>';
                return;
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div style="color:#8888aa;padding:20px;text-align:center;">No CDKs found</div>';
                return;
            }

            list.innerHTML = filtered.map(cdk => {
                const uses = cdk.uses || 0;
                const maxUses = cdk.maxUses || 1;
                const isUsed = cdk.used === true;
                const isPartial = !isUsed && uses > 0 && uses < maxUses;
                const isAvailable = !isUsed && uses < maxUses;

                let badgeClass = 'badge-available';
                let badgeText = '✅ AVAILABLE';
                if (isUsed) {
                    badgeClass = 'badge-used';
                    badgeText = '❌ USED';
                } else if (isPartial) {
                    badgeClass = 'badge-partial';
                    badgeText = `⚠️ ${uses}/${maxUses} USED`;
                }

                const createdAt = cdk.createdAt ? new Date(cdk.createdAt.toDate()).toLocaleString() : 'N/A';
                const lastUsed = cdk.lastUsedAt ? new Date(cdk.lastUsedAt.toDate()).toLocaleString() : 'Never';

                return `
                    <div class="cdk-item">
                        <div class="info">
                            <div class="key">${cdk.key}</div>
                            <div class="meta">
                                Created: ${createdAt} · Last: ${lastUsed}
                                ${cdk.lastUserEmail ? ' · ' + cdk.lastUserEmail : ''}
                            </div>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                            <span class="badge ${badgeClass}">${badgeText}</span>
                            ${!isUsed && isAvailable ? `<button onclick="deleteCDK('${cdk.id}')" style="padding:4px 12px;border:0;background:#fd79a8;color:#fff;border-radius:4px;cursor:pointer;font-size:11px;">🗑️</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== FILTER =====
        function filterCDK(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-bar button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderCDKs();
        }

        // ===== ADD CDK =====
        async function addCDK() {
            if (!isAdmin) {
                toast('🔐 Please login first', 'error');
                return;
            }

            const input = document.getElementById('newCdk');
            const key = input.value.trim().toUpperCase();
            const maxUses = parseInt(document.getElementById('usageLimit').value);

            if (!key || !key.startsWith('CDK-') || key.split('-').length !== 4) {
                document.getElementById('addStatus').textContent = '❌ Format: CDK-XXXX-XXXX-XXXX';
                document.getElementById('addStatus').style.color = '#fd79a8';
                return;
            }

            // Check if key already exists
            const existing = allCDKs.find(c => c.key === key);
            if (existing) {
                document.getElementById('addStatus').textContent = '❌ Key already exists';
                document.getElementById('addStatus').style.color = '#fd79a8';
                return;
            }

            try {
                await db.collection('cdk').add({
                    key: key,
                    used: false,
                    uses: 0,
                    maxUses: maxUses,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                });
                document.getElementById('addStatus').textContent = `✅ CDK added! (${maxUses} uses allowed)`;
                document.getElementById('addStatus').style.color = '#55efc4';
                input.value = '';
                loadCDKs();
                toast('CDK added ✓', 'success');
            } catch (e) {
                document.getElementById('addStatus').textContent = '❌ ' + e.message;
                document.getElementById('addStatus').style.color = '#fd79a8';
            }
        }

        // ===== DELETE CDK =====
        async function deleteCDK(id) {
            if (!confirm('Delete this CDK permanently?')) return;
            try {
                await db.collection('cdk').doc(id).delete();
                loadCDKs();
                toast('CDK deleted ✓', 'success');
            } catch (e) {
                toast('Error: ' + e.message, 'error');
            }
        }

        // ===== REFRESH =====
        function refreshList() {
            loadCDKs();
            toast('Refreshed ✓', 'info');
        }

        // ===== TOAST =====
        function toast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            clearTimeout(t._hide);
            t._hide = setTimeout(() => t.classList.remove('show'), 4000);
        }

        // ===== REAL-TIME LISTENER =====
        db.collection('cdk').onSnapshot(() => {
            if (isAdmin) loadCDKs();
        });

        // ===== INIT =====
        // Check if already logged in via session
        document.getElementById('cdkList').innerHTML = '<div style="color:#8888aa;padding:20px;text-align:center;">🔐 Please login to view CDKs</div>';

        // Enter key for login
        document.getElementById('adminPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loginAdmin();
        });
    </script>
</body>
</html>
