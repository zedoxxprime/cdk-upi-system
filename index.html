<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPI QR · ChatGPT Plus India</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 480px;
            width: 100%;
            padding: 20px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid #2a2a4a;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #00d4aa, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .step-guide {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 0 4px;
        }
        .step {
            text-align: center;
            flex: 1;
            position: relative;
        }
        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            margin: 0 auto 4px;
            border: 2px solid #3a3a5a;
        }
        .step.active .step-num {
            background: #00d4aa;
            border-color: #00d4aa;
            color: #000;
        }
        .step-label {
            font-size: 11px;
            color: #666;
        }
        .step.active .step-label {
            color: #00d4aa;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #aaa;
        }
        textarea, input {
            width: 100%;
            padding: 12px 14px;
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            color: #e5e5e5;
            font-size: 13px;
            font-family: 'SF Mono', 'Monaco', monospace;
            resize: vertical;
            transition: border-color 0.2s;
        }
        textarea:focus, input:focus {
            outline: none;
            border-color: #00d4aa;
        }
        textarea {
            min-height: 80px;
        }
        .token-display {
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 11px;
            font-family: 'SF Mono', monospace;
            word-break: break-all;
            color: #00d4aa;
            min-height: 36px;
            display: flex;
            align-items: center;
            margin-top: 6px;
        }
        .token-display.empty {
            color: #555;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #00d4aa, #00bfff);
            color: #000;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0,212,170,0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn.secondary {
            background: #2a2a4a;
            color: #e5e5e5;
            font-size: 13px;
            padding: 10px;
        }
        .btn.secondary:hover {
            background: #3a3a5a;
            box-shadow: none;
        }
        .btn.danger {
            background: #4a1a1a;
            color: #ff6b6b;
        }
        .qr-section {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a2a4a;
            text-align: center;
        }
        .qr-section.visible {
            display: block;
        }
        #qrcode {
            display: inline-block;
            padding: 16px;
            background: white;
            border-radius: 16px;
            margin: 12px 0;
        }
        #qrcode img, #qrcode canvas {
            border-radius: 8px;
        }
        .url-box {
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 10px 12px;
            word-break: break-all;
            font-size: 11px;
            color: #888;
            margin: 8px 0;
            text-align: left;
        }
        .url-box a {
            color: #00bfff;
            text-decoration: none;
        }
        .status {
            text-align: center;
            font-size: 13px;
            padding: 8px;
            border-radius: 10px;
            margin-top: 12px;
        }
        .status.loading {
            color: #ffd700;
        }
        .status.error {
            color: #ff6b6b;
            background: #2a1010;
        }
        .status.success {
            color: #00d4aa;
            background: #0a2a1a;
        }
        .badge {
            display: inline-block;
            background: #2a2a4a;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            color: #aaa;
        }
        .cdk-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2a2a4a;
        }
        .cdk-section input {
            font-family: inherit;
            font-size: 14px;
        }
        .admin-link {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
        }
        .admin-link a {
            color: #555;
            text-decoration: none;
        }
        .admin-link a:hover {
            color: #888;
        }
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .card { padding: 20px 16px; border-radius: 16px; }
            h1 { font-size: 19px; }
        }
        .plan-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .plan-option {
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .plan-option:hover {
            border-color: #3a3a5a;
        }
        .plan-option.selected {
            border-color: #00d4aa;
            background: #0a2a1a;
        }
        .plan-option .plan-name {
            font-size: 14px;
            font-weight: 600;
        }
        .plan-option .plan-price {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>UPI QR · ChatGPT Plus</h1>
            <p class="subtitle">India ₹0 Trial · Scan with GPay / PhonePe / Paytm</p>

            <div class="step-guide">
                <div class="step active" id="step1">
                    <div class="step-num">1</div>
                    <div class="step-label">Session</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-num">2</div>
                    <div class="step-label">Verify</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-num">3</div>
                    <div class="step-label">QR</div>
                </div>
            </div>

            <!-- Step 1: Paste Session JSON -->
            <div class="input-group">
                <label>
                    📋 Paste Session JSON from <code style="color:#00bfff;">chatgpt.com/api/auth/session</code>
                    <span style="float:right;font-size:11px;color:#555;">
                        <a href="https://chatgpt.com/api/auth/session" target="_blank" style="color:#00bfff;">Open ↗</a>
                    </span>
                </label>
                <textarea id="sessionInput" placeholder='Paste the full JSON from https://chatgpt.com/api/auth/session

Example:
{"user":{"id":"user-...","name":"..."},"accessToken":"eyJhbGciOi..."...}'></textarea>
            </div>

            <div class="token-display empty" id="tokenDisplay">
                Waiting for access token...
            </div>

            <!-- CDK Section -->
            <div class="cdk-section">
                <div class="input-group">
                    <label>🔑 CDK Key <span class="badge">Required</span></label>
                    <input type="text" id="cdkInput" placeholder="Enter your CDK key">
                </div>
                <button class="btn secondary" id="verifyCdkBtn" style="margin-top:0;" onclick="verifyCDK()">Verify CDK</button>
                <div id="cdkStatus" class="status" style="display:none;"></div>
            </div>

            <!-- Generate Button -->
            <button class="btn" id="generateBtn" disabled onclick="generateCheckout()">
                🚀 Generate UPI QR Code
            </button>
            <div id="status" class="status" style="display:none;"></div>

            <!-- QR Output -->
            <div class="qr-section" id="qrSection">
                <p style="font-size:14px;font-weight:600;margin-bottom:4px;">📱 Scan with UPI App</p>
                <p style="font-size:12px;color:#888;margin-bottom:8px;">GPay · PhonePe · Paytm</p>
                <div id="qrcode"></div>
                <p id="amountDisplay" style="font-size:24px;font-weight:700;color:#00d4aa;">₹0</p>
                <p style="font-size:13px;color:#888;" id="productDisplay">ChatGPT Plus · Monthly</p>
                <div class="url-box" id="urlBox">
                    <a href="#" id="checkoutLink" target="_blank"></a>
                </div>
                <button class="btn secondary" onclick="copyUrl()">📋 Copy Checkout URL</button>
                <button class="btn danger" onclick="resetAll()">✕ New Session</button>
            </div>

            <div class="admin-link">
                <a href="/admin">🔐 Admin Panel</a>
            </div>
        </div>
    </div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",
            authDomain: "globexo-d9ade.firebaseapp.com",
            projectId: "globexo-d9ade",
            storageBucket: "globexo-d9ade.firebasestorage.app",
            messagingSenderId: "958970083539",
            appId: "1:958970083539:web:2ef276e3a5b519a6374b77"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let accessToken = '';
        let checkoutUrl = '';
        let cdkValidated = false;
        let qrCode = null;

        // Auto-extract access token from session JSON
        document.getElementById('sessionInput').addEventListener('input', function() {
            const val = this.value.trim();
            const display = document.getElementById('tokenDisplay');
            
            if (!val) {
                display.textContent = 'Waiting for access token...';
                display.className = 'token-display empty';
                accessToken = '';
                document.getElementById('step1').className = 'step active';
                checkReady();
                return;
            }

            // Try parsing as JSON first
            try {
                const parsed = JSON.parse(val);
                if (parsed.accessToken) {
                    accessToken = parsed.accessToken;
                } else if (parsed.access_token) {
                    accessToken = parsed.access_token;
                } else {
                    // Maybe the whole thing IS a token? Check if it's a nested JSON with user
                    const keys = Object.keys(parsed);
                    if (keys.includes('user') && parsed.user && parsed.user.email) {
                        // It's a session JSON without explicit accessToken field
                        // Look deeper
                        for (const key of keys) {
                            if (typeof parsed[key] === 'string' && parsed[key].startsWith('eyJ')) {
                                accessToken = parsed[key];
                                break;
                            }
                        }
                    }
                }
            } catch (e) {
                // Not JSON - check if it starts with eyJ (raw JWT)
                if (val.startsWith('eyJ')) {
                    accessToken = val;
                } else {
                    accessToken = '';
                }
            }

            if (accessToken && accessToken.startsWith('eyJ')) {
                display.textContent = accessToken.substring(0, 40) + '...';
                display.className = 'token-display';
                document.getElementById('step1').className = 'step completed';
                document.getElementById('step2').className = 'step active';
            } else {
                display.textContent = '❌ Invalid token format (must start with eyJ...)';
                display.className = 'token-display empty';
                document.getElementById('step1').className = 'step active';
            }
            
            checkReady();
        });

        function checkReady() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = !(accessToken && accessToken.startsWith('eyJ') && cdkValidated);
        }

        // Verify CDK against Firebase
        async function verifyCDK() {
            const cdk = document.getElementById('cdkInput').value.trim();
            const status = document.getElementById('cdkStatus');
            
            if (!cdk) {
                status.textContent = '❌ Please enter a CDK key';
                status.className = 'status error';
                status.style.display = 'block';
                return;
            }

            status.textContent = '⏳ Verifying CDK...';
            status.className = 'status loading';
            status.style.display = 'block';

            try {
                const doc = await db.collection('cdk_keys').doc(cdk).get();
                
                if (!doc.exists) {
                    status.textContent = '❌ Invalid CDK key';
                    status.className = 'status error';
                    cdkValidated = false;
                    checkReady();
                    return;
                }

                const data = doc.data();
                
                if (data.used === true) {
                    status.textContent = '❌ CDK key already used';
                    status.className = 'status error';
                    cdkValidated = false;
                    checkReady();
                    return;
                }

                if (data.expires && new Date(data.expires.toDate()) < new Date()) {
                    status.textContent = '❌ CDK key expired';
                    status.className = 'status error';
                    cdkValidated = false;
                    checkReady();
                    return;
                }

                status.textContent = '✅ CDK validated!';
                status.className = 'status success';
                cdkValidated = true;
                document.getElementById('step2').className = 'step completed';
                document.getElementById('step3').className = 'step active';
                checkReady();

            } catch (err) {
                console.error('Firebase error:', err);
                status.textContent = '❌ Error verifying CDK: ' + err.message;
                status.className = 'status error';
                cdkValidated = false;
                checkReady();
            }
        }

        // Generate checkout URL by calling our backend API
        async function generateCheckout() {
            if (!accessToken || !cdkValidated) return;

            const status = document.getElementById('status');
            const btn = document.getElementById('generateBtn');
            const qrSection = document.getElementById('qrSection');

            status.textContent = '⏳ Generating checkout session...';
            status.className = 'status loading';
            status.style.display = 'block';
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        accessToken: accessToken,
                        plan_name: 'chatgptplusplan',
                        country: 'IN',
                        currency: 'INR'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to generate checkout');
                }

                checkoutUrl = data.url;

                if (!checkoutUrl || !checkoutUrl.startsWith('https://')) {
                    throw new Error('Invalid checkout URL received');
                }

                // Mark CDK as used in Firebase
                const cdk = document.getElementById('cdkInput').value.trim();
                try {
                    await db.collection('cdk_keys').doc(cdk).update({
                        used: true,
                        usedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        usedToken: accessToken.substring(0, 20) + '...'
                    });
                } catch (e) {
                    console.warn('Could not mark CDK as used:', e);
                }

                // Generate QR code
                qrSection.className = 'qr-section visible';
                
                if (qrCode) {
                    qrCode.clear();
                }
                
                qrCode = new QRCode(document.getElementById('qrcode'), {
                    text: checkoutUrl,
                    width: 256,
                    height: 256,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });

                document.getElementById('amountDisplay').textContent = '₹0';
                document.getElementById('productDisplay').textContent = 'ChatGPT Plus · Monthly India';
                document.getElementById('checkoutLink').textContent = checkoutUrl;
                document.getElementById('checkoutLink').href = checkoutUrl;
                document.getElementById('urlBox').style.display = 'block';

                status.textContent = '✅ QR Code generated! Scan with UPI app.';
                status.className = 'status success';
                
                document.getElementById('step3').className = 'step completed';

            } catch (err) {
                console.error('Checkout error:', err);
                status.textContent = '❌ ' + err.message;
                status.className = 'status error';
                qrSection.className = 'qr-section';
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Generate UPI QR Code';
                checkReady();
            }
        }

        function copyUrl() {
            if (checkoutUrl) {
                navigator.clipboard.writeText(checkoutUrl).then(() => {
                    const btn = document.querySelector('.btn.secondary');
                    const orig = btn.textContent;
                    btn.textContent = '✅ Copied!';
                    setTimeout(() => btn.textContent = orig, 2000);
                });
            }
        }

        function resetAll() {
            document.getElementById('sessionInput').value = '';
            document.getElementById('tokenDisplay').textContent = 'Waiting for access token...';
            document.getElementById('tokenDisplay').className = 'token-display empty';
            document.getElementById('cdkInput').value = '';
            document.getElementById('cdkStatus').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('qrSection').className = 'qr-section';
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('step1').className = 'step active';
            document.getElementById('step2').className = 'step';
            document.getElementById('step3').className = 'step';
            accessToken = '';
            checkoutUrl = '';
            cdkValidated = false;
            if (qrCode) { qrCode.clear(); qrCode = null; }
        }

        // Enter key to verify CDK
        document.getElementById('cdkInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') verifyCDK();
        });
    </script>
</body>
</html>
