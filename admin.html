<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — CDK Manager</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8f0;font-family:Inter,sans-serif;padding:30px}
.container{max-width:900px;margin:0 auto}
h1{font-size:28px;margin-bottom:24px;background:linear-gradient(135deg,#6c5ce7,#00b894);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#111118;border:1px solid #2a2a3a;border-radius:16px;padding:24px;margin-bottom:20px}
label{display:block;color:#8888aa;font-size:12px;font-weight:600;margin:12px 0 6px}
input{width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid #2a2a3a;border-radius:8px;color:#fff;font-family:monospace;font-size:14px}
input:focus{outline:none;border-color:#6c5ce7}
.btn{padding:10px 24px;border:0;border-radius:8px;background:linear-gradient(135deg,#6c5ce7,#00b894);color:#fff;font-weight:700;cursor:pointer;margin-top:10px}
.btn:hover{transform:translateY(-2px)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:rgba(0,0,0,0.2);border:1px solid #2a2a3a;border-radius:8px;padding:14px;text-align:center}
.stat .num{font-size:28px;font-weight:800}
.stat .label{font-size:11px;color:#8888aa}
.cdk-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid #2a2a3a;border-radius:8px;margin:6px 0;background:rgba(0,0,0,0.2);flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700}
.badge-available{background:rgba(0,184,148,0.2);color:#55efc4}
.badge-used{background:rgba(253,121,168,0.2);color:#fd79a8}
.badge-partial{background:rgba(255,209,102,0.2);color:#ffd166}
.pass-box{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pass-box input{width:auto;min-width:200px}
.pass-box .btn{margin-top:0}
.hidden{display:none !important}
</style>
</head>
<body>
<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <h1>🔐 CDK Manager</h1>
        <a href="/" style="color:#55efc4;text-decoration:none;">← Back</a>
    </div>

    <!-- Login -->
    <div id="loginBox" class="card">
        <div style="text-align:center;margin-bottom:16px;">
            <div style="font-size:40px;">🔐</div>
            <h2>Admin Login</h2>
        </div>
        <div class="pass-box">
            <input type="password" id="adminPass" placeholder="Enter admin password..." style="flex:1;min-width:200px;" />
            <button class="btn" onclick="login()">Login</button>
        </div>
        <div id="loginMsg" style="margin-top:8px;color:#fd79a8;font-size:13px;"></div>
    </div>

    <!-- Panel -->
    <div id="panel" class="hidden">
        <div class="stats">
            <div class="stat"><div class="num" id="totalKeys">0</div><div class="label">Total</div></div>
            <div class="stat"><div class="num" id="availableKeys" style="color:#55efc4;">0</div><div class="label">Available</div></div>
            <div class="stat"><div class="num" id="usedKeys" style="color:#fd79a8;">0</div><div class="label">Used</div></div>
        </div>

        <div class="card">
            <h2 style="font-size:18px;">➕ Generate CDK</h2>
            <div style="display:grid;grid-template-columns:2fr 1fr;gap:10px;">
                <div>
                    <label>CDK Key</label>
                    <input id="newCdk" placeholder="CDK-XXXX-XXXX-XXXX" style="text-transform:uppercase;letter-spacing:1px;" />
                </div>
                <div>
                    <label>Uses</label>
                    <input id="usesInput" type="number" value="1" min="1" max="999" />
                </div>
            </div>
            <button class="btn" onclick="addCDK()">➕ Add CDK</button>
            <div id="addStatus" style="margin-top:8px;font-size:13px;color:#8888aa;"></div>
        </div>

        <div class="card">
            <h2 style="font-size:18px;">📋 All CDKs</h2>
            <div id="cdkList"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",
    authDomain: "globexo-d9ade.firebaseapp.com",
    projectId: "globexo-d9ade",
    storageBucket: "globexo-d9ade.firebasestorage.app",
    appId: "1:1009453417317:web:32538a719df79d3c6ed78c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASSWORD = 'admin123'; // Change this!

let isLoggedIn = false;

function login() {
    const pass = document.getElementById('adminPass').value;
    if (pass === ADMIN_PASSWORD) {
        isLoggedIn = true;
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('panel').classList.remove('hidden');
        loadCDKs();
        document.getElementById('loginMsg').textContent = '';
    } else {
        document.getElementById('loginMsg').textContent = '❌ Wrong password';
    }
}

// Enter key for login
document.getElementById('adminPass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
});

async function loadCDKs() {
    if (!isLoggedIn) return;
    const snap = await db.collection('cdk').orderBy('createdAt', 'desc').get();
    const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const available = all.filter(c => !c.used && (c.uses || 0) < (c.maxUses || 1));
    const used = all.filter(c => c.used || (c.uses || 0) >= (c.maxUses || 1));

    document.getElementById('totalKeys').textContent = all.length;
    document.getElementById('availableKeys').textContent = available.length;
    document.getElementById('usedKeys').textContent = used.length;

    const list = document.getElementById('cdkList');
    if (all.length === 0) {
        list.innerHTML = '<div style="color:#8888aa;padding:20px;text-align:center;">No CDKs</div>';
        return;
    }

    list.innerHTML = all.map(c => {
        const used = c.uses || 0;
        const max = c.maxUses || 1;
        const isUsed = c.used || used >= max;
        const isPartial = !isUsed && used > 0;
        
        let badge = 'badge-available';
        let label = '✅ Available';
        if (isUsed) { badge = 'badge-used'; label = '❌ Used'; }
        else if (isPartial) { badge = 'badge-partial'; label = used + '/' + max + ' used'; }

        return `<div class="cdk-item">
            <div>
                <div style="font-family:monospace;font-weight:600;">${c.key}</div>
                <div style="font-size:11px;color:#8888aa;">${c.label || ''} ${c.lastUserEmail ? '· ' + c.lastUserEmail : ''}</div>
            </div>
            <span class="badge ${badge}">${label}</span>
        </div>`;
    }).join('');
}

function randCDK() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s = '';
    for (let i = 0; i < 12; i++) {
        s += chars[Math.floor(Math.random() * chars.length)];
        if (i === 3 || i === 7) s += '-';
    }
    return 'CDK-' + s;
}

async function addCDK() {
    if (!isLoggedIn) return;
    const key = document.getElementById('newCdk').value.trim().toUpperCase() || randCDK();
    const maxUses = parseInt(document.getElementById('usesInput').value) || 1;
    const status = document.getElementById('addStatus');

    try {
        await db.collection('cdk').doc(key).set({
            key: key,
            used: false,
            uses: 0,
            maxUses: maxUses,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            createdBy: 'admin'
        });
        status.textContent = '✅ Added: ' + key + ' (' + maxUses + ' uses)';
        status.style.color = '#55efc4';
        document.getElementById('newCdk').value = '';
        loadCDKs();
    } catch(e) {
        status.textContent = '❌ ' + e.message;
        status.style.color = '#fd79a8';
    }
}

db.collection('cdk').onSnapshot(() => { if (isLoggedIn) loadCDKs(); });
</script>
</body>
</html>
