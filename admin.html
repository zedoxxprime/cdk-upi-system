<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Zedox CDK Key System</title>
<link rel="stylesheet" href="/style.css" />
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="bg"></div>
<main class="shell">
  <header class="top">
    <div class="brand">
      <div class="logo">🔐</div>
      <div>
        <h1>Zedox CDK Admin</h1>
        <p>Generate & Manage CDK Activation Keys</p>
      </div>
    </div>
    <div>
      <a class="pill" href="/">⬅ User Page</a>
    </div>
  </header>

  <!-- LOGIN -->
  <section id="loginSection" class="card">
    <h2>🔐 Admin Login</h2>
    <label>Email</label>
    <input id="email" value="admin@globexo.com" />
    <label>Password</label>
    <input id="pass" type="password" placeholder="Admin password" />
    <button class="primary" onclick="adminLogin()">Login</button>
    <div id="loginMsg" class="status hidden"></div>
  </section>

  <!-- ADMIN PANEL -->
  <section id="panel" class="hidden">
    <!-- STATS -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-head"><h2>📊 Dashboard</h2><span>LIVE</span></div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        <div class="stat-box"><b id="statKeys">0</b><span>Total Keys</span></div>
        <div class="stat-box"><b id="statActive">0</b><span>Active</span></div>
        <div class="stat-box"><b id="statUsed">0</b><span>Used</span></div>
        <div class="stat-box"><b id="statCheckouts">0</b><span>Checkouts</span></div>
      </div>
    </div>

    <div class="grid">
      <!-- GENERATE KEY -->
      <section class="card">
        <div class="card-head"><h2>➕ Generate CDK Key</h2><span>KEY MAKER</span></div>
        
        <label>Key Type</label>
        <div class="plans" style="grid-template-columns:1fr 1fr 1fr">
          <button class="plan selected" id="typeSingle" onclick="setType('single')">🔑 Single</button>
          <button class="plan" id="typeMulti" onclick="setType('multi')">♾️ Multi</button>
          <button class="plan" id="typeCustom" onclick="setType('custom')">📋 Custom</button>
        </div>

        <div id="usesRow">
          <label>Number of Uses</label>
          <input id="usesInput" type="number" value="1" min="1" max="999999" />
        </div>

        <label>Plan</label>
        <div class="plans" style="grid-template-columns:1fr 1fr">
          <button class="plan selected" id="planPlus" onclick="setPlan('plus')">💎 Plus (₹0 Trial)</button>
          <button class="plan" id="planPro" onclick="setPlan('pro')">🔮 Pro</button>
        </div>

        <label>Label / Customer</label>
        <input id="labelInput" placeholder="e.g. John, Batch 1, Telegram user" />

        <label>📢 Channel Name</label>
        <input id="channelInput" placeholder="e.g. Telegram, YouTube, PartnerX" />

        <label>📞 Contact</label>
        <input id="contactInput" placeholder="e.g. @handle, phone, email" />

        <button class="primary" onclick="generateCDK()">🔑 Generate CDK Key</button>
        <div id="keyResult" class="status hidden"></div>
      </section>

      <!-- KEYS LIST -->
      <section class="card">
        <div class="card-head"><h2>📋 CDK Keys</h2><span id="keyCount">0</span></div>
        <input id="searchInput" placeholder="🔍 Search key, label, channel..." oninput="renderKeys()" style="margin-bottom:10px;padding:10px;font-size:13px" />
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
          <button class="pill" style="font-size:10px;padding:4px 8px" onclick="filter='all';renderKeys()">All</button>
          <button class="pill" style="font-size:10px;padding:4px 8px" onclick="filter='active';renderKeys()">✅ Active</button>
          <button class="pill" style="font-size:10px;padding:4px 8px" onclick="filter='revoked';renderKeys()">🚫 Revoked</button>
          <button class="pill" style="font-size:10px;padding:4px 8px" onclick="filter='empty';renderKeys()">⚠️ Used Up</button>
        </div>
        <div id="keysList" style="max-height:500px;overflow-y:auto"></div>
      </section>
    </div>

    <!-- CHECKOUTS -->
    <section class="card" style="margin-top:16px">
      <div class="card-head"><h2>💳 Recent Checkouts</h2><span id="checkoutCount">0</span></div>
      <div id="checkoutList"></div>
    </section>

    <!-- MANUAL CONFIRM -->
    <section class="card" style="margin-top:16px">
      <div class="card-head"><h2>✅ Manual Confirm</h2><span>ADMIN</span></div>
      <label>Checkout ID</label>
      <input id="confirmCid" placeholder="Checkout ID" />
      <button class="primary" onclick="manualConfirm()">Confirm Payment</button>
      <div id="confirmMsg" class="status hidden"></div>
    </section>
  </section>
</main>

<style>
.stat-box {
  background:#0b1020;
  border:1px solid #2d3559;
  border-radius:14px;
  padding:14px;
  text-align:center;
}
.stat-box b {
  display:block;
  font-size:24px;
  color:#70f0a8;
}
.stat-box span {
  color:#8993ba;
  font-size:11px;
}
</style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",
  authDomain: "globexo-d9ade.firebaseapp.com",
  databaseURL: "https://globexo-d9ade-default-rtdb.firebaseio.com",
  projectId: "globexo-d9ade",
  storageBucket: "globexo-d9ade.firebasestorage.app",
  messagingSenderId: "1009453417317",
  appId: "1:1009453417317:web:32538a719df79d3c6ed78c",
  measurementId: "G-X0QPY3ML6M"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let keyType = 'single';
let plan = 'plus';
let filter = 'all';
let allKeys = [];
let allCheckouts = [];

auth.onAuthStateChanged(u => {
  document.getElementById('loginSection').classList.toggle('hidden', !!u);
  document.getElementById('panel').classList.toggle('hidden', !u);
  if (u) { loadData(); setInterval(loadData, 20000); }
});

function adminLogin() {
  auth.signInWithEmailAndPassword(
    document.getElementById('email').value,
    document.getElementById('pass').value
  ).catch(e => {
    document.getElementById('loginMsg').className = 'status err';
    document.getElementById('loginMsg').textContent = '❌ ' + e.message;
  });
}

function setType(t) {
  keyType = t;
  ['single','multi','custom'].forEach(x =>
    document.getElementById('type' + x.charAt(0).toUpperCase() + x.slice(1))
      .classList.toggle('selected', x === t)
  );
  document.getElementById('usesRow').style.display = t === 'multi' ? 'none' : 'block';
  if (t === 'single') document.getElementById('usesInput').value = '1';
  if (t === 'multi') document.getElementById('usesInput').value = '999999';
  if (t === 'custom') document.getElementById('usesInput').value = '5';
}

function setPlan(p) {
  plan = p;
  document.getElementById('planPlus').classList.toggle('selected', p === 'plus');
  document.getElementById('planPro').classList.toggle('selected', p === 'pro');
}

function randCDK() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 12; i++) {
    s += c[Math.floor(Math.random() * c.length)];
    if (i === 3 || i === 7) s += '-';
  }
  return 'CDK-' + s;
}

async function generateCDK() {
  const key = randCDK();
  const maxUses = parseInt(document.getElementById('usesInput').value) || 1;
  const label = document.getElementById('labelInput').value || 'No label';
  const channel = document.getElementById('channelInput').value || '';
  const contact = document.getElementById('contactInput').value || '';

  try {
    await db.collection('activation_keys').doc(key).set({
      key, label, plan, type: keyType,
      active: true, maxUses, usesRemaining: maxUses,
      channel, contact,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdBy: auth.currentUser?.email || 'admin',
      usedLogs: []
    });

    document.getElementById('keyResult').className = 'status ok';
    document.getElementById('keyResult').innerHTML = `
      ✅ CDK Created!<br>
      <b style="font-size:22px;word-break:break-all">${key}</b><br>
      <small>${plan === 'plus' ? '💎 Plus' : '🔮 Pro'} · ${keyType} · ${maxUses >= 999999 ? '♾️' : maxUses + ' uses'}${channel ? ' · 📢 ' + channel : ''}${contact ? ' · 📞 ' + contact : ''}</small><br>
      <button onclick="navigator.clipboard.writeText('${key}')" style="margin-top:8px;padding:8px 16px;border:1px solid #384060;background:#11172a;color:#fff;border-radius:999px;cursor:pointer">📋 Copy</button>
      <button onclick="window.open('/?key=${key}','_blank')" style="margin-top:8px;padding:8px 16px;border:1px solid #384060;background:#11172a;color:#fff;border-radius:999px;cursor:pointer;margin-left:8px">🔗 Link</button>
    `;

    document.getElementById('labelInput').value = '';
    document.getElementById('channelInput').value = '';
    document.getElementById('contactInput').value = '';
    loadData();
  } catch(e) {
    document.getElementById('keyResult').className = 'status err';
    document.getElementById('keyResult').textContent = '❌ ' + e.message;
  }
}

async function loadData() {
  await Promise.all([loadKeys(), loadCheckouts(), loadStats()]);
}

async function loadKeys() {
  try {
    const snap = await db.collection('activation_keys')
      .orderBy('createdAt', 'desc').limit(200).get();
    allKeys = [];
    snap.forEach(d => allKeys.push({ id: d.id, ...d.data() }));
    renderKeys();
  } catch(e) {}
}

function renderKeys() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allKeys;

  if (filter === 'active') filtered = filtered.filter(k => k.active);
  else if (filter === 'revoked') filtered = filtered.filter(k => !k.active);
  else if (filter === 'empty') filtered = filtered.filter(k => k.usesRemaining <= 0 && k.maxUses < 999999);

  if (q) filtered = filtered.filter(k =>
    k.key?.toLowerCase().includes(q) ||
    k.label?.toLowerCase().includes(q) ||
    k.channel?.toLowerCase().includes(q) ||
    k.contact?.toLowerCase().includes(q)
  );

  document.getElementById('keyCount').textContent = filtered.length;
  const list = document.getElementById('keysList');
  list.innerHTML = '';

  filtered.forEach(k => {
    const div = document.createElement('div');
    div.className = 'details';
    div.style.marginBottom = '6px';
    div.style.padding = '10px 12px';

    const usesStr = k.maxUses >= 999999 ? '♾️' : `${k.maxUses - (k.usesRemaining || 0)}/${k.maxUses}`;
    const planEmoji = k.plan === 'pro' ? '🔮' : '💎';

    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;gap:6px;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <b style="color:#70f0a8;word-break:break-all;font-size:13px">${k.key}</b>
          <div style="font-size:11px;color:#7a84b0;margin-top:2px">
            ${planEmoji} ${k.plan || 'plus'} · ${k.type || 'single'} · ${usesStr}
          </div>
          ${k.label ? `<div style="font-size:10px;color:#7a84b0">📝 ${k.label}</div>` : ''}
          ${k.channel ? `<div style="font-size:10px;color:#7a84b0">📢 ${k.channel}</div>` : ''}
          ${k.contact ? `<div style="font-size:10px;color:#7a84b0">📞 ${k.contact}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
          <span style="font-size:10px;padding:2px 8px;border-radius:999px;background:${k.active?'#0d2c20':'#321016'};color:${k.active?'#70f0a8':'#ff6b6b'};border:1px solid ${k.active?'#236b4a':'#71303a'}">
            ${k.active?'Active':'Revoked'}
          </span>
          <div style="display:flex;gap:3px">
            <button onclick="navigator.clipboard.writeText('${k.key}')" style="padding:2px 6px;border:1px solid #384060;background:#11172a;color:#fff;border-radius:999px;cursor:pointer;font-size:10px">📋</button>
            ${k.active ? `<button onclick="revokeKey('${k.key}')" style="padding:2px 6px;border:1px solid #71303a;background:#321016;color:#ff6b6b;border-radius:999px;cursor:pointer;font-size:10px">🚫</button>` : ''}
            <button onclick="editKey('${k.key}')" style="padding:2px 6px;border:1px solid #384060;background:#11172a;color:#ffd166;border-radius:999px;cursor:pointer;font-size:10px">✏️</button>
          </div>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

async function revokeKey(key) {
  if (!confirm('Revoke ' + key + '?')) return;
  await db.collection('activation_keys').doc(key).update({ active: false });
  loadData();
}

async function editKey(key) {
  const k = allKeys.find(x => x.key === key);
  if (!k) return;
  const newCh = prompt('Channel:', k.channel || '');
  if (newCh === null) return;
  const newCo = prompt('Contact:', k.contact || '');
  if (newCo === null) return;
  await db.collection('activation_keys').doc(key).update({ channel: newCh, contact: newCo });
  loadData();
}

async function loadCheckouts() {
  try {
    const snap = await db.collection('checkouts')
      .orderBy('createdAt', 'desc').limit(50).get();
    allCheckouts = [];
    snap.forEach(d => allCheckouts.push({ id: d.id, ...d.data() }));
    renderCheckouts();
  } catch(e) {}
}

function renderCheckouts() {
  document.getElementById('checkoutCount').textContent = allCheckouts.length;
  const list = document.getElementById('checkoutList');
  list.innerHTML = '';

  allCheckouts.forEach(c => {
    const div = document.createElement('div');
    div.className = 'details';
    div.style.marginBottom = '5px';
    div.style.padding = '8px 12px';

    const sc = c.status === 'completed' ? '#70f0a8' : '#ffd166';

    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;font-size:12px">
        <div>
          <b>${c.checkoutId || c.id}</b><br>
          <span style="color:#7a84b0">👤 ${c.user?.name || c.user?.email || '?'} · ${c.planName || 'Plus'}</span>
          ${c.channel ? `<br><span style="color:#7a84b0">📢 ${c.channel}</span>` : ''}
        </div>
        <div style="text-align:right">
          <span style="color:${sc};font-weight:700">${(c.status||'pending').toUpperCase()}</span>
          ${c.status === 'pending' ? `<br><button onclick="quickConfirm('${c.checkoutId || c.id}')" style="padding:2px 6px;border:1px solid #236b4a;background:#0d2c20;color:#70f0a8;border-radius:999px;cursor:pointer;font-size:10px;margin-top:4px">✅</button>` : ''}
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

async function quickConfirm(id) {
  await db.collection('checkouts').doc(id).update({
    status: 'completed',
    completedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  loadData();
}

async function manualConfirm() {
  const cid = document.getElementById('confirmCid').value.trim();
  if (!cid) return;
  await db.collection('checkouts').doc(cid).update({
    status: 'completed',
    completedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById('confirmMsg').className = 'status ok';
  document.getElementById('confirmMsg').textContent = '✅ Confirmed!';
  document.getElementById('confirmCid').value = '';
  loadData();
}

async function loadStats() {
  document.getElementById('statKeys').textContent = allKeys.length;
  document.getElementById('statActive').textContent = allKeys.filter(k => k.active).length;
  document.getElementById('statUsed').textContent = allKeys.filter(k => !k.active || (k.usesRemaining <= 0 && k.maxUses < 999999)).length;
  document.getElementById('statCheckouts').textContent = allCheckouts.length;
}
</script>
</body>
</html>
